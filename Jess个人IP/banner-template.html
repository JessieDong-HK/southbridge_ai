<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1500px;
    height: 500px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }

  .banner {
    width: 1500px;
    height: 500px;
    background: linear-gradient(135deg, #f5f0eb 0%, #e8e2da 30%, #d4cfc7 60%, #c8c2b8 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Subtle texture layer */
  .banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 50%, rgba(180, 170, 155, 0.3) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 80% 70%, rgba(190, 180, 165, 0.2) 0%, transparent 60%);
    z-index: 0;
  }

  /* Fine grain overlay */
  .banner::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    background-size: 256px 256px;
    z-index: 0;
  }

  .content {
    position: relative;
    z-index: 1;
    text-align: center;
  }

  .name {
    font-size: 26px;
    font-weight: 500;
    color: #3d3832;
    letter-spacing: 0.04em;
    margin-bottom: 8px;
  }

  .divider {
    width: 32px;
    height: 1px;
    background: #9e968a;
    margin: 0 auto 12px auto;
  }

  .tagline {
    font-size: 13px;
    font-weight: 400;
    color: #7a7268;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* Light accent shapes */
  .shape-1 {
    position: absolute;
    top: -120px;
    right: -60px;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: rgba(200, 190, 175, 0.15);
    z-index: 0;
  }

  .shape-2 {
    position: absolute;
    bottom: -80px;
    left: -40px;
    width: 220px;
    height: 220px;
    border-radius: 50%;
    background: rgba(180, 170, 155, 0.12);
    z-index: 0;
  }
</style>
</head>
<body>
<div class="banner">
  <div class="shape-1"></div>
  <div class="shape-2"></div>
  <div class="content">
    <div class="name">Jess Dong</div>
    <div class="divider"></div>
    <div class="tagline">Building with AI · Sharing the Process</div>
  </div>
</div>
</body>
</html>
